services:
  - type: web
    name: travel-agent-crm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: AMADEUS_HOSTNAME
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: travel-crm-db
          property: connectionString

databases:
  - name: travel-crm-db
    databaseName: travel_crm
    plan: free
